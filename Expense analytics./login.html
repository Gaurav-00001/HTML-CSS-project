<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Analytics Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container">
        <div id="auth-section" class="card">
            <h2 id="auth-title">Welcome Back</h2>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button class="btn-center" id="auth-btn" onclick="handleAuth()">Sign In</button>
            <p id="toggle-area">
                <span id="toggle-text">Don't have an account?</span> 
                <span class="toggle-link" onclick="toggleAuth()">Create one</span>
            </p>
        </div>

        <div id="dashboard" class="hidden">
            <div class="nav-header">
                <h2>Analytics Dashboard</h2>
                <button onclick="location.reload()" class="logout-btn">Logout</button>
            </div>
            
            <div class="tab-group">
                <button class="tab-btn active" onclick="changeView('daily', this)">Daily</button>
                <button class="tab-btn" onclick="changeView('monthly', this)">Monthly</button>
                <button class="tab-btn" onclick="changeView('yearly', this)">Yearly</button>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><h5>Total Spent</h5><h2 id="period-total">$0</h2></div>
                <div class="stat-card"><h5>Top Category</h5><h2 id="top-cat">-</h2></div>
                <div class="stat-card"><h5>Entries</h5><h2 id="item-count">0</h2></div>
            </div>

            <div class="card">
                <div class="chart-container">
                    <canvas id="analyticsChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Add New Expense</h3>
                <div class="input-grid">
                    <div class="input-group">
                        <label>Product Name</label>
                        <input type="text" id="p-name" placeholder="e.g. Coffee">
                    </div>
                    <div class="input-group">
                        <label>Category</label>
                        <select id="p-cat">
                            <option value="Food">Food 🍔</option>
                            <option value="Rent">Rent 🏠</option>
                            <option value="Tech">Tech 💻</option>
                            <option value="Transport">Transport 🚗</option>
                            <option value="Other">Other ✨</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Amount ($)</label>
                        <input type="number" id="p-amount" placeholder="0.00">
                    </div>
                    <div class="input-group">
                        <label>Date</label>
                        <input type="date" id="p-date">
                    </div>
                </div>
                <button class="btn-center full-btn" onclick="addExpense()">Add Expense</button>
            </div>

            <div class="card">
                <h3>Recent Transactions</h3>
                <ul id="expense-list" class="expense-list"></ul>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>   
</body>
</html>
